name: Android Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write   # Required for gh release create

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Full history for git rev-list --count (version number)

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Run unit tests
        run: ./gradlew test --stacktrace

      - name: Run lint
        run: ./gradlew lintDebug --stacktrace

      - name: Upload lint report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: lint-report
          path: app/build/reports/lint-results-debug.html
          retention-days: 14
          if-no-files-found: warn

      - name: Run detekt SAST
        run: ./gradlew detekt --stacktrace

      - name: Upload detekt report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: detekt-report
          path: app/build/reports/detekt/
          retention-days: 14
          if-no-files-found: warn

      - name: APK security check
        run: |
          APKANALYZER=$(find $ANDROID_HOME/cmdline-tools -name apkanalyzer -type f 2>/dev/null | head -1)
          APK=app/build/outputs/apk/debug/app-debug.apk
          MANIFEST=$("$APKANALYZER" manifest print "$APK")
          if echo "$MANIFEST" | grep -qE 'exported="true"' && \
             ! echo "$MANIFEST" | grep -qE 'permission='; then
            echo "WARNING: exported component(s) without permission found"
          fi
          echo "APK advisory check complete (advisory only in Phase 1)"

      - name: Upload debug APK
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14

      - name: Publish APK release
        if: github.ref == 'refs/heads/main' && success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Extract base version (e.g. "0.9.0") and compute build number
          # matching the Gradle logic: versionName = "0.9.0.$buildNumber"
          BASE_VERSION=$(grep 'versionName' app/build.gradle.kts | head -1 | sed 's/.*"\([0-9.]*\)\..*/\1/')
          BUILD=$(git rev-list --count HEAD)
          VERSION="${BASE_VERSION}.${BUILD}"
          TAG="v${VERSION}"
          # Build release notes from commits since last tag
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            CHANGES=$(git log "$PREV_TAG"..HEAD --pretty=format:"- %s" --no-merges)
          else
            CHANGES=$(git log -20 --pretty=format:"- %s" --no-merges)
          fi
          printf "## What's Changed\n\n%s\n\n**Full changelog**: https://github.com/${{ github.repository }}/compare/%s...%s\n" \
            "$CHANGES" "${PREV_TAG:-v0.0.0}" "$TAG" > /tmp/release-notes.md
          gh release create "$TAG" \
            app/build/outputs/apk/debug/app-debug.apk \
            --title "AndroDR $TAG" \
            --notes-file /tmp/release-notes.md \
            || echo "Release publish failed"

  instrumented-test:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Enable KVM for hardware acceleration
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run instrumented tests on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_6
          script: ./gradlew connectedDebugAndroidTest --stacktrace

      - name: Upload instrumented test report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: instrumented-test-report
          path: app/build/reports/androidTests/connected/
          retention-days: 14
          if-no-files-found: warn

  # dependency-scan job removed -- replaced by Dependabot (.github/dependabot.yml).
  # The OWASP dependency-check plugin kept timing out on the NVD feed and added
  # ~10 minutes per PR with no new signal. GitHub's advisory database via
  # Dependabot fires only on real CVEs and produces grouped, monthly PRs.

  secret-scan:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          GITLEAKS_VERSION=8.18.4
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          sudo mv gitleaks /usr/local/bin/

      - name: Scan for secrets
        run: gitleaks detect --source . --verbose

