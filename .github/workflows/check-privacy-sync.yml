name: Check privacy sync

on:
  pull_request:
    paths:
      - 'docs/PRIVACY_POLICY.md'
      - 'cloudflare-worker.js'
      - 'scripts/render_privacy.py'
      - 'scripts/requirements.txt'
      - '.github/workflows/check-privacy-sync.yml'

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install renderer dependencies
        run: python -m pip install -r scripts/requirements.txt

      - name: Render into a copy and diff
        run: |
          cp cloudflare-worker.js /tmp/worker-expected.js
          python3 scripts/render_privacy.py docs/PRIVACY_POLICY.md /tmp/worker-expected.js
          if ! diff -q cloudflare-worker.js /tmp/worker-expected.js > /dev/null; then
            echo "::error::cloudflare-worker.js is out of sync with docs/PRIVACY_POLICY.md"
            echo
            echo "Run this locally, commit the result, and push:"
            echo
            echo "    python3 scripts/render_privacy.py docs/PRIVACY_POLICY.md cloudflare-worker.js"
            echo
            echo "Diff:"
            diff -u cloudflare-worker.js /tmp/worker-expected.js | head -80 || true
            exit 1
          fi
          echo "cloudflare-worker.js is in sync with docs/PRIVACY_POLICY.md"
