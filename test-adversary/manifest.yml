  # ── Track 4: CVE vulnerability detection (NEW — issue #25) ────────────
  - id: cve_unpatched_detection
    track: 4
    risk: high
    technique: T1404
    tactic: initial-access
    description: "Device with stale patch level triggers CVE finding with evidence"
    source: adb_inject
    inject: []
    # No injection needed — relies on the device's actual patch level being behind
    # the CISA KEV entries. On a fresh emulator with no CVE DB refresh, the safe
    # finding ("No Known Exploited CVEs") proves the engine runs.
    attack: [T1404]
    expected_patterns:
      - "CVEs"
      - "DEVICE CHECKS"

  - id: cve_campaign_pegasus
    track: 4
    risk: high
    technique: T1404
    tactic: initial-access
    description: "Pegasus campaign rule fires when device has matching unpatched CVEs"
    source: adb_inject
    inject: []
    # Depends on device patch level being old enough that Pegasus CVEs are unpatched.
    # On emulator with 2025-03-01 patch, CVE-2023-41064 (fixed 2023-12-05) should be patched.
    # This scenario validates campaign attribution appears in the report when applicable.
    attack: [T1404]
    expected_patterns:
      - "Pegasus"
    # Campaign-specific patterns depend on actual patch level:
    # If device is old enough: "CVEs linked to Pegasus" should also appear
    # This scenario may PASS or EXPECTED FAIL depending on emulator patch level

  - id: cve_settings_display
    track: 4
    risk: high
    technique: T1404
    tactic: initial-access
    description: "Settings threat DB shows CVE count after update"
    source: adb_inject
    inject:
      - type: trigger_update
        adb_cmd: "shell am broadcast -a com.androdr.ACTION_SCAN -p com.androdr.debug"
    attack: [T1404]
    expected_patterns:
      # After a scan, the report header shows patch level
      - "Patch"
      - "OVERALL RISK"

