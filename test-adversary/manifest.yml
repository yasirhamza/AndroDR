        adb_cmd: "shell nslookup cdn-tp2.xyz 10.0.0.2"
    attack: [T1437]
    expected_patterns:
      - "[MATCHED]"
      - "cdn-tp2.xyz"

  - id: mercenary_ip_c2
    track: 3
    risk: medium
    technique: T1437
    tactic: command-and-control
    description: "Direct TCP connection to known C2 IP"
    source: adb_inject
    inject:
