title: DNS query to known C2 domain
id: androdr-003
status: production
description: DNS query matched a known command-and-control domain from threat intelligence feeds.
author: AndroDR
date: 2026/03/27
tags:
    - attack.t1437
logsource:
    product: androdr
    service: dns_monitor
detection:
    selection:
        domain|ioc_lookup: domain_ioc_db
    condition: selection
level: critical
display:
    category: app_risk
    icon: warning
    triggered_title: "Malicious Domain"
    evidence_type: ioc_match
    guidance: "INVESTIGATE -- device contacted a known C2 server"
remediation:
