title: Non-system app accessed microphone
id: androdr-063
status: production
description: A non-system app has used the microphone (RECORD_AUDIO). Expected for phone, messaging, and voice assistant apps. Review if the app is unexpected.
author: AndroDR
date: 2026/03/28
tags:
    - attack.t1429
logsource:
    product: androdr
    service: appops_audit
detection:
    selection:
        operation: "android:record_audio"
        is_system_app: false
    filter_known_good:
        package_name|ioc_lookup: known_good_app_db
    condition: selection and not filter_known_good
level: medium
display:
    category: app_risk
    icon: mic
    triggered_title: "Microphone Access"
    evidence_type: none
remediation:
    - "This app has accessed your microphone. Review whether this is expected behavior."
