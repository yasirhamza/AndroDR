title: Non-system app with no launcher icon
id: androdr-068
status: production
description: >
    A non-system app has no launcher icon, making it invisible on the home
    screen. Stalkerware (mSpy, FlexiSPY, TheTruthSpy) commonly hides its
    launcher icon to avoid detection by the device owner.
author: AndroDR
date: 2026/04/04
tags:
    - attack.t1628.002
logsource:
    product: androdr
    service: app_scanner
detection:
    selection:
        has_launcher_activity: false
        is_system_app: false
        is_known_oem_app: false
    filter_known_good:
        package_name|ioc_lookup: known_good_app_db
    condition: selection and not filter_known_good
level: high
display:
    category: app_risk
    icon: visibility_off
    triggered_title: "Hidden App (No Launcher Icon)"
    evidence_type: none
remediation:
    - "This app is installed but hidden from your home screen -- you cannot see or open it normally."
    - "Go to Settings > Apps > See all apps to find it, then tap Uninstall."
    - "Hidden apps are a common sign of stalkerware or monitoring software."
