title: Sideloaded app with accessibility service AND surveillance permissions
id: androdr-017
status: experimental
description: Combines screen reading capability with surveillance permissions -- a hallmark of stalkerware.
author: AndroDR
date: 2026/03/27
tags:
    - attack.t1626
    - attack.t1429
    - attack.t1430
logsource:
    product: androdr
    service: app_scanner
detection:
    selection:
        is_system_app: false
        from_trusted_store: false
        has_accessibility_service: true
        surveillance_permission_count|gte: 2
    filter_known_good:
        package_name|ioc_lookup: known_good_app_db
    condition: selection and not filter_known_good
level: critical
display:
    category: app_risk
    icon: visibility
    triggered_title: "Stalkerware Pattern"
    evidence_type: none
remediation:
    - "This app combines screen reading with surveillance permissions."
    - "Disable its accessibility service in Settings, then uninstall."
