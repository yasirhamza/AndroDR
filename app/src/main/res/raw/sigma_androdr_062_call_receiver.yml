title: App registered for phone call broadcasts
id: androdr-062
status: production
description: A non-system app is registered for PHONE_STATE or NEW_OUTGOING_CALL broadcasts. Many legitimate apps register for these. Informational -- only significant when combined with other indicators.
author: AndroDR
date: 2026/03/28
tags:
    - attack.t1636
logsource:
    product: androdr
    service: receiver_audit
detection:
    selection_phone_state:
        intent_action: "android.intent.action.PHONE_STATE"
        is_system_app: false
    selection_outgoing_call:
        intent_action: "android.intent.action.NEW_OUTGOING_CALL"
        is_system_app: false
    filter_known_good:
        package_name|ioc_lookup: known_good_app_db
    condition: selection_phone_state and not filter_known_good or selection_outgoing_call and not filter_known_good
level: informational
display:
    category: app_risk
    icon: phone
    triggered_title: "Phone Call Broadcast Receiver"
    evidence_type: none
remediation:
    - "This app is registered for phone call broadcasts. Review if you expect this behavior from this app."
