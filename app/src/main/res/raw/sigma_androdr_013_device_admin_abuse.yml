title: Sideloaded app with device administrator
id: androdr-013
status: production
description: Sideloaded app registers a DeviceAdminReceiver, preventing uninstallation.
author: AndroDR
date: 2026/03/27
tags:
    - attack.t1401
logsource:
    product: androdr
    service: app_scanner
detection:
    selection:
        is_system_app: false
        from_trusted_store: false
        has_device_admin: true
    filter_known_good:
        package_name|ioc_lookup: known_good_app_db
    condition: selection and not filter_known_good
level: high
display:
    category: app_risk
    icon: admin_panel_settings
    triggered_title: "Device Admin Abuse"
    evidence_type: none
remediation:
    - "Go to Settings > Security > Device Admin Apps and remove this app first, then uninstall."
