title: CVE exploited by Predator spyware
id: androdr-049
status: production
description: >
    Device has unpatched CVEs known to be exploited by Intellexa's
    Predator mercenary spyware.
author: AndroDR
date: 2026/03/27
tags:
    - attack.t1404
    - campaign.predator
logsource:
    product: androdr
    service: device_auditor
detection:
    selection:
        unpatched_cve_id|contains:
            - "CVE-2023-4211"
            - "CVE-2023-33106"
            - "CVE-2023-33107"
    condition: selection
display:
    category: device_posture
    icon: shield_alert
    triggered_title: "{count} CVEs linked to Predator"
    safe_title: "No Predator-linked CVEs"
    evidence_type: cve_list
    summary_template: "Predator spyware exploits {count} unpatched CVEs on this device"
level: critical
remediation:
    - "Update to the latest security patch immediately. These CVEs are exploited by Predator spyware."
