title: APK signed with known bad certificate
id: androdr-002
status: production
description: APK signing certificate hash matches a known threat certificate.
author: AndroDR
date: 2026/03/27
tags:
    - attack.t1628
logsource:
    product: androdr
    service: app_scanner
detection:
    selection:
        cert_hash|ioc_lookup: cert_hash_ioc_db
    condition: selection
level: critical
display:
    category: app_risk
    icon: warning
    triggered_title: "Malicious Certificate"
    evidence_type: ioc_match
remediation:
    - "This app is signed by a known threat developer. Uninstall it even if the name looks legitimate."
