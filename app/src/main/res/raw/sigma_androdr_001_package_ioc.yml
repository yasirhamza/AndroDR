title: Package name matches threat database
id: androdr-001
status: production
description: Package name found in known-bad package IOC database. System apps with dual-use package names (e.g., com.android.updater on Xiaomi) are excluded -- real implants masquerading as system components are sideloaded, not pre-installed.
author: AndroDR
date: 2026/03/27
tags:
    - attack.t1418
logsource:
    product: androdr
    service: app_scanner
detection:
    selection:
        package_name|ioc_lookup: package_ioc_db
    filter_system_app:
        is_system_app: true
    condition: selection and not filter_system_app
level: critical
display:
    category: app_risk
    icon: warning
    triggered_title: "Known Malicious Package"
    evidence_type: ioc_match
remediation:
    - "Uninstall this app immediately."
