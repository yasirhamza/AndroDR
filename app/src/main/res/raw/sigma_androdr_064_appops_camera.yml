title: Non-system app accessed camera
id: androdr-064
status: production
description: A non-system app has used the camera. Expected for camera, messaging, and social media apps. Review if the app is unexpected.
author: AndroDR
date: 2026/03/28
tags:
    - attack.t1429
logsource:
    product: androdr
    service: appops_audit
detection:
    selection:
        operation: "android:camera"
        is_system_app: false
    filter_known_good:
        package_name|ioc_lookup: known_good_app_db
    condition: selection and not filter_known_good
level: medium
category: incident
display:
    category: app_risk
    icon: camera
    triggered_title: "Camera Access"
    evidence_type: none
remediation:
    - "This app has accessed your camera. Review whether this is expected behavior."
