title: Sideloaded app with accessibility service
id: androdr-012
status: production
description: Sideloaded app registers an AccessibilityService, enabling screen reading and keylogging.
author: AndroDR
date: 2026/03/27
tags:
    - attack.t1626
logsource:
    product: androdr
    service: app_scanner
detection:
    selection:
        is_system_app: false
        from_trusted_store: false
        has_accessibility_service: true
    filter_known_good:
        package_name|ioc_lookup: known_good_app_db
    condition: selection and not filter_known_good
level: high
display:
    category: app_risk
    icon: accessibility
    triggered_title: "Accessibility Abuse"
    evidence_type: none
    guidance: "UNINSTALL -- accessibility service abuse indicates stalkerware"
remediation:
    - "This app can read your screen content. Go to Settings > Accessibility and disable its service before uninstalling."
