title: Non-system app with active accessibility service
id: androdr-060
status: production
description: A non-system app has an accessibility service currently enabled. Many legitimate apps (password managers, security tools) use accessibility services. Investigate if the app is unexpected.
author: AndroDR
date: 2026/03/28
tags:
    - attack.t1626
logsource:
    product: androdr
    service: accessibility_audit
detection:
    selection:
        is_system_app: false
        is_enabled: true
    filter_known_good:
        package_name|ioc_lookup: known_good_app_db
    condition: selection and not filter_known_good
level: medium
display:
    category: app_risk
    icon: accessibility
    triggered_title: "Active Accessibility Service"
    evidence_type: none
remediation:
    - "This app has an active accessibility service. Password managers and security tools commonly use this. Investigate if you don't recognize the app."
